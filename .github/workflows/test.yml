name: test

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install pre-commit
      - run: pre-commit run --all-files
        env:
          SKIP: rst

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14" ]
        django-version: [ "4.2", "5.0", "5.1", "5.2", "6.0" ]
        exclude:
          # Django 4.2 does not support Python 3.13+
          - django-version: "4.2"
            python-version: "3.13"
          - django-version: "4.2"
            python-version: "3.14"
          # Django 5.x drops Python <3.10 support
          - django-version: "5.0"
            python-version: "3.8"
          - django-version: "5.0"
            python-version: "3.9"
          - django-version: "5.1"
            python-version: "3.8"
          - django-version: "5.1"
            python-version: "3.9"
          - django-version: "5.2"
            python-version: "3.8"
          - django-version: "5.2"
            python-version: "3.9"
          # Django 5.0 does not support Python 3.13+
          - django-version: "5.0"
            python-version: "3.13"
          - django-version: "5.0"
            python-version: "3.14"
          # Django 6.0 requires Python 3.13+
          - django-version: "6.0"
            python-version: "3.8"
          - django-version: "6.0"
            python-version: "3.9"
          - django-version: "6.0"
            python-version: "3.10"
          - django-version: "6.0"
            python-version: "3.11"
          - django-version: "6.0"
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "${{ matrix.python-version }}"
      - uses: snok/install-poetry@v1
        with:
          virtualenvs-create: false
          version: 1.8.5
      - run: |
          pip install virtualenv
          virtualenv .venv
          source .venv/bin/activate
          pip install pip setuptools wheel -U
          poetry install --no-interaction --no-root
      - run: |
          source .venv/bin/activate
          pip install "Django==${{ matrix.django-version }}"
      - name: Run tests
        run: |
          source .venv/bin/activate
          coverage run -m pytest tests
          coverage xml
          coverage report
      - uses: codecov/codecov-action@v2
        with:
          file: ./coverage.xml
          fail_ci_if_error: true
        if: matrix.python-version == '3.11'
